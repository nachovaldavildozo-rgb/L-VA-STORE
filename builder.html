<!DOCTYPE html>
<html>
<head>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="styles/styles.css">
</head>

<body>

<div class="grid grid-cols-2 h-screen">

<!-- IZQUIERDA -->
<div class="p-6 space-y-6">

<h2 class="text-xl font-bold">Personaliza</h2>

<select id="type" class="w-full p-3 border rounded">
<option value="tshirt">Oversized</option>
<option value="hoodie">Canguro</option>
<option value="crop">Crop</option>
</select>

<input type="color" id="color" class="w-full h-12">

<input type="file" id="upload">

<div id="gallery" class="grid grid-cols-3 gap-2"></div>

<select id="size" class="w-full p-3 border">
<option>S</option>
<option>M</option>
<option>L</option>
<option>XL</option>
</select>

<button id="addCart" class="btn w-full">
Agregar al carrito
</button>

</div>

<!-- DERECHA -->
<div class="flex justify-center items-center">

<div class="relative">

<img id="product" src="assets/tshirt.png" class="w-80">

<img id="design"
class="absolute top-20 left-20 w-32 cursor-move">

</div>

</div>

</div>

<script src="js/builder.js"></script>

</body>
</html>

Ver carrito 🛒
</a>
